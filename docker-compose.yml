services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      ADMIN_KEY: ${ADMIN_KEY:?ADMIN_KEY must be set}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/contests"]
      interval: 30s
      timeout: 5s
      retries: 3
