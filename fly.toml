app = 'gewinnspiele-ben'
primary_region = 'fra'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = 'gewinnspiele_data'
  destination = '/app/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
